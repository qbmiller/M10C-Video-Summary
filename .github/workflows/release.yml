name: Release Extension

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g., v2.1.0). If empty, defaults to v<version> from package.json.'
        required: false
        default: ''
      prerelease:
        description: 'Mark this release as a prerelease'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Extract Version and Determine Tag
        id: get_tag
        run: |
          # Read version from package.json
          VERSION=$(node -p "require('./package.json').version")
          
          # Use manual input if provided, otherwise default to v<version>
          INPUT_TAG="${{ github.event.inputs.tag_name }}"
          if [ -z "$INPUT_TAG" ]; then
            TAG="v$VERSION"
          else
            TAG="$INPUT_TAG"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Determined Version: $VERSION"
          echo "Determined Git Tag: $TAG"

      - name: Create and Push Git Tag
        run: |
          # Configure Git credentials
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Delete tag if it already exists locally and on remote
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally. Deleting..."
            git tag -d "$TAG"
          fi
          
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists on remote. Deleting..."
            git push origin --delete "$TAG" || true
          fi
          
          # Create and push new tag
          echo "Creating and pushing tag: $TAG"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build and Package Chrome MV3 Extension
        run: pnpm zip

      - name: Build and Package Firefox MV2 Extension
        run: pnpm zip:firefox

      - name: Verify Built Artifacts
        run: |
          echo "Checking built artifacts in .output/ directory:"
          ls -la .output/

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          body: |
            ## 🚀 Extension Release ${{ env.TAG }}
            
            This is an automated release built for **Chrome** and **Firefox** browser extensions.
            
            ### 📦 Download & Install:
            - **Chrome Version (MV3):** `wxt-react-starter-${{ env.VERSION }}-chrome.zip`
            - **Firefox Version (MV2):** `wxt-react-starter-${{ env.VERSION }}-firefox.zip`
            - **Sources (Firefox submission):** `wxt-react-starter-${{ env.VERSION }}-sources.zip`
            
            ---
            *Automatically compiled and packaged via GitHub Actions on manually triggered release.*
          files: |
            .output/*.zip
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
